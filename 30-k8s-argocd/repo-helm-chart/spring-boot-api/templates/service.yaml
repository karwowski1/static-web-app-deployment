apiVersion: v1
kind: Service
metadata:
  name: { { include "spring-boot-api.fullname" . } }
  labels:
    app: { { include "spring-boot-api.name" . } }
spec:
  type: ClusterIP
  selector:
    app: { { include "spring-boot-api.name" . } }
  ports:
    - name: api
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: logs
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: soap
      port: 8082
      targetPort: 8082
      protocol: TCP
