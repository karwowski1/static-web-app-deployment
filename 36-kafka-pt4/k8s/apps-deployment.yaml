apiVersion: apps/v1
kind: Deployment
metadata:
  name: publisher
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: publisher
  template:
    metadata:
      labels:
        app: publisher
    spec:
      containers:
        - name: publisher
          image: my-kafka-app:v1
          imagePullPolicy: IfNotPresent
          command: ["node", "publisher.js"]
          env:
            - name: KAFKA_BROKERS
              value: "my-cluster-kafka-bootstrap:9092"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: processor
  namespace: kafka
spec:
  replicas: 2
  selector:
    matchLabels:
      app: processor
  template:
    metadata:
      labels:
        app: processor
    spec:
      containers:
        - name: processor
          image: my-kafka-app:v1
          imagePullPolicy: IfNotPresent
          command: ["node", "processor.js"]
          env:
            - name: KAFKA_BROKERS
              value: "my-cluster-kafka-bootstrap:9092"
